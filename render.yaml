services:
  - type: web
    name: ideas-studio
    env: python
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && python -m patchright install chromium
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEFAULT_LLM_PROVIDER
        value: openrouter
